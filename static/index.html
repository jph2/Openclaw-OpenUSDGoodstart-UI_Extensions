<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Workbench MVP</title>
    <link rel="stylesheet" href="./static/styles.css" />
    <script type="module" src="./static/app.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-head">
          <h1>Workbench</h1>
          <p>Read-only artifact browser MVP</p>
        </div>
        <label>
          <span>Root</span>
          <select id="rootSelect"></select>
        </label>
        <label>
          <span>Relative path</span>
          <div class="input-row">
            <input id="pathInput" type="text" placeholder="docs/openclaw-four-repo-strategy-v1.md" />
            <button id="openPathBtn">Open</button>
          </div>
        </label>
        <label>
          <span>Absolute path</span>
          <div class="input-row">
            <input id="absolutePathInput" type="text" placeholder="/home/claw-agentbox/.openclaw/workspace/docs/..." />
            <button id="openAbsoluteBtn">Open</button>
          </div>
        </label>
        <label>
          <span>Filename search</span>
          <input id="searchInput" type="text" placeholder="Type a filename; filters apply live" />
        </label>
        <div class="filter-row three-up">
          <select id="kindFilter">
            <option value="all">all kinds</option>
            <option value="text">text</option>
            <option value="image">image</option>
            <option value="pdf">pdf</option>
            <option value="dir">folder</option>
          </select>
          <select id="ageFilter">
            <option value="all">all ages</option>
            <option value="1d">1 day</option>
            <option value="7d">7 days</option>
            <option value="30d">30 days</option>
            <option value="older">older</option>
          </select>
          <select id="sizeFilter">
            <option value="all">all sizes</option>
            <option value="tiny">&lt;10 KB</option>
            <option value="small">10–100 KB</option>
            <option value="medium">100 KB–1 MB</option>
            <option value="large">&gt;1 MB</option>
          </select>
        </div>
        <div id="searchResults" class="search-results muted small">Start typing to search.</div>
        <div class="control-row">
          <button id="openFolderBtn">Open folder</button>
          <button id="refreshTreeBtn">Refresh tree</button>
        </div>
        <div id="debugStatus" class="debug-status muted small">debug: pending</div>

        <div class="sidebar-stack" id="sidebarStack">
          <div class="tree-wrap" id="treeWrap">
            <div class="section-head">
              <h2>Tree</h2>
              <span class="muted small">classic folder navigation</span>
            </div>
            <div id="treeView" class="tree-view"></div>
          </div>

          <div id="treeHeightResizer" class="pane-resizer horizontal" aria-hidden="true"></div>

          <div class="listing-wrap docs-list-wrap" id="docsWrap">
            <h2>Latest workspace docs</h2>
            <ul id="docsIndex"></ul>
          </div>
        </div>
      </aside>

      <div id="sidebarResizer" class="pane-resizer" aria-hidden="true"></div>

      <main class="main-panel">
        <header class="toolbar">
          <div class="path-block">
            <div><strong>Repo-relative:</strong></div>
            <input id="relativePathDisplay" class="path-edit" type="text" />
            <div><strong>Absolute:</strong></div>
            <input id="absolutePathDisplay" class="path-edit" type="text" />
          </div>
          <div class="toolbar-actions">
            <button id="rawBtn">Raw</button>
            <button id="previewBtn">Preview</button>
            <button id="copyLinkBtn">Copy link</button>
          </div>
        </header>

        <section class="content-grid">
          <section id="viewer" class="viewer empty-state">
            Select a file from the left.
          </section>
          <div id="outlineResizer" class="pane-resizer vertical" aria-hidden="true"></div>
          <aside class="outline-panel" id="outlinePanel">
            <div class="outline-header">
              <h2>Outline / Preview tools</h2>
              <div id="previewControls" class="preview-controls"></div>
            </div>
            <ul id="outline"></ul>
          </aside>
        </section>
      </main>
    </div>
  </body>
</html>
