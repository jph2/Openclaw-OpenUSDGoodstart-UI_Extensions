<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Channel Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0a0a0a;
            --bg-surface: #111111;
            --bg-elevated: #1a1a1a;
            --border-color: #2a2a2a;
            --text-primary: #e0e0e0;
            --text-secondary: #888888;
            --accent: #50e3c2;
            --accent-hover: #3bc9a8;
            --danger: #e35050;
            --warning: #e3c450;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            z-index: 100;
            padding-top: 20px;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 600;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
        }
        
        button {
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        button:hover {
            background: var(--border-color);
            border-color: var(--accent);
        }
        
        button.primary {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: 500;
        }
        
        button.primary:hover {
            background: var(--accent-hover);
        }
        
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        select, input[type="text"] {
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            min-width: 200px;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        /* Table Styles */
        .channel-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-surface);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        
        .channel-table th {
            background: var(--bg-elevated);
            padding: 16px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
        }
        
        .channel-table td {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: top;
        }
        
        .channel-table tr:hover {
            background: rgba(80, 227, 194, 0.05);
        }
        
        .channel-table tr:last-child td {
            border-bottom: none;
        }
        
        /* Column 1: Telegram Group */
        .tg-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .tg-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .tg-id {
            font-size: 11px;
            color: var(--text-secondary);
            font-family: monospace;
        }
        
        /* Column 2: Skills - Vertical Layout */
        .skills-cell {
            min-width: 350px;
        }
        
        .skills-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .skill-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        
        .skill-item:hover {
            border-color: var(--accent);
        }
        
        .skill-item.active {
            border-color: var(--accent);
            background: rgba(80, 227, 194, 0.05);
        }
        
        .skill-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            margin-top: 2px;
            flex-shrink: 0;
        }
        
        .skill-content {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .skill-name {
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
        }
        
        .skill-separator {
            color: var(--text-secondary);
            font-weight: 300;
        }
        
        .skill-desc {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 400;
        }
        
        .skill-item button.remove {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 2px;
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .skill-item button.remove:hover {
            color: var(--danger);
        }
        
        .add-skill-row {
            display: flex;
            gap: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border-color);
        }
        .add-skill-row select {
            flex: 1;
            min-width: 150px;
        }
        
        /* Custom Tooltip */
        .info-tooltip-container {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .info-tooltip-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid var(--text-secondary);
            color: var(--text-secondary);
            font-size: 10px;
            font-weight: bold;
            cursor: help;
            opacity: 0.6;
            margin-left: 4px;
            transition: opacity 0.2s;
        }

        .info-tooltip-container:hover .info-tooltip-icon {
            opacity: 1;
        }

        .info-tooltip-text {
            visibility: hidden;
            width: 260px; /* Narrower width for taller text box */
            background-color: var(--bg-elevated);
            color: var(--text-primary);
            text-align: left;
            border-radius: 6px;
            padding: 12px;
            position: absolute;
            z-index: 200;
            bottom: 150%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.2s;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            font-size: 11px;
            line-height: 1.5;
            font-weight: normal;
        }

        /* Tooltip arrow */
        .info-tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: var(--border-color) transparent transparent transparent;
        }

        .info-tooltip-container:hover .info-tooltip-text {
            visibility: visible;
            opacity: 1;
        }
        
        /* Column 3: Model - Compact Layout */
        .model-cell {
            min-width: 200px;
        }
        
        .model-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .model-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        
        .model-item:hover {
            background: var(--bg-elevated);
        }
        
        .model-item.active {
            background: rgba(80, 227, 194, 0.1);
            border-color: var(--accent);
        }
        
        .model-item input[type="radio"] {
            width: 14px;
            height: 14px;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .model-content {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        
        .model-name {
            font-size: 13px;
            font-weight: 600;
        }
        
        .model-separator {
            color: var(--text-secondary);
            font-weight: 300;
        }
        
        .model-desc {
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            padding: 16px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 200;
        }
        
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        
        .toast.success {
            border-color: var(--accent);
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
        }
        
        .tab {
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .tab:hover {
            color: var(--text-primary);
        }
        
        .tab.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: 500;
        }
        
        /* Skill Overview */
        .skill-overview {
            display: none;
        }
        
        .skill-overview.active {
            display: block;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Status Indicators */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .status-badge.active {
            background: rgba(80, 227, 194, 0.15);
            color: var(--accent);
        }
        
        .status-badge.idle {
            background: rgba(136, 136, 136, 0.15);
            color: var(--text-secondary);
        }
        
        .status-badge.planning {
            background: rgba(227, 196, 80, 0.15);
            color: var(--warning);
        }
        
        .status-badge.research {
            background: rgba(80, 128, 227, 0.15);
            color: #5080e3;
        }
        
        .status-badge.standby {
            background: rgba(227, 80, 80, 0.15);
            color: var(--danger);
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }
        
        .current-task {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        .assigned-agent {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 6px;
        }
        
        /* Agent Cards */
        .agent-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }
        
        .agent-card.main {
            border-left: 4px solid;
        }
        
        .agent-card h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }
        
        .agent-role {
            font-size: 12px;
            color: var(--accent);
            margin-bottom: 8px;
        }
        
        .agent-desc {
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        .sub-agents {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }
        
        .sub-agent-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: var(--bg-elevated);
            border-radius: 4px;
            font-size: 11px;
            margin-right: 6px;
            margin-bottom: 6px;
        }
        
        .skill-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }
        
        .skill-card h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: var(--accent);
        }
        
        .skill-card p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.5;
        }
    
        /* Row Level Tabs and Chat */
        .row-tabs {
            display: flex;
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border-color);
        }
        
        .row-tab {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            border-radius: 0;
        }
        
        .row-tab:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }
        
        .row-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: var(--bg-surface);
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .chat-message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }
        
        .chat-message.user {
            align-self: flex-end;
        }
        
        .chat-message.bot {
            align-self: flex-start;
        }
        
        .chat-bubble {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
        }
        
        .chat-message.user .chat-bubble {
            background: var(--accent);
            color: #000;
            border-bottom-right-radius: 2px;
        }
        
        .chat-message.bot .chat-bubble {
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 2px;
        }
        
        .chat-meta {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 4px;
            display: flex;
            gap: 6px;
        }
        
        .chat-message.user .chat-meta {
            align-self: flex-end;
        }
    
        /* THICKER ROW SEPARATOR */
        tbody tr td {
            border-bottom: 3px solid rgba(255, 255, 255, 0.1); 
        }

        /* CUSTOM FULL-WIDTH RESIZER */
        .resizer-handle {
            width: 100%;
            height: 12px;
            background: var(--bg-surface);
            border-top: 1px solid var(--border-color);
            cursor: ns-resize;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            user-select: none;
        }
        .resizer-handle:hover, .resizer-handle:active {
            background: var(--bg-elevated);
        }
        .resizer-handle div {
            width: 30px;
            height: 3px;
            border-top: 1px solid var(--text-secondary);
            border-bottom: 1px solid var(--text-secondary);
            opacity: 0.5;
        }

    </style>
</head>
<body>
    <header>
        <div style="display: flex; align-items: center; gap: 30px;">
            <h1>📺 Channel Manager</h1>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('channels')" id="tab-channels">Manage Channels</button>
                <button class="tab" onclick="switchTab('skills')" id="tab-skills">Skills</button>
                <button class="tab" onclick="switchTab('agents')" id="tab-agents">Agents</button>
            </div>
        </div>
        <div class="header-actions">
            <span id="saveStatus" style="font-size: 12px; color: var(--text-secondary); margin-right: 10px;"></span>
            <button onclick="exportConfig()">📥 Export</button>
            <label style="cursor: pointer;">
                <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importConfig(this)">
                <span style="background: var(--bg-elevated); border: 1px solid var(--border-color); color: var(--text-primary); padding: 8px 16px; border-radius: 6px; font-size: 14px;">📤 Import</span>
            </label>
            <button onclick="loadConfig()">🔄 Reload</button>
            <button class="primary" onclick="saveConfig()" id="saveBtn">💾 Save</button>
        </div>
    </header>
    
    <!-- Filters - Only visible on Channels tab -->
    <div id="channel-filters" class="toolbar">
        <input type="text" id="searchInput" placeholder="Search channels..." oninput="filterChannels()">
        <select id="filterModel" onchange="filterChannels()">
            <option value="">All models</option>
        </select>
        <select id="filterSkill" onchange="filterChannels()">
            <option value="">All skills</option>
        </select>
        <button onclick="resetFilters()">Reset</button>
        <span id="filterCount" style="margin-left: auto; color: var(--text-secondary);"></span>
    </div>
    <!-- Manage Channels Tab -->
    <div id="channels-tab" class="tab-content active">
    <div class="toolbar">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
            <span>Select All</span>
        </label>
        <select id="bulkModelSelect">
            <option value="">Set model for selected...</option>
        </select>
        <button onclick="applyBulkModel()">Apply</button>
        <select id="bulkSkillSelect">
            <option value="">Add skill to selected...</option>
        </select>
        <button onclick="applyBulkSkill()">Add</button>
        <button onclick="applyGlobalModel()" style="margin-left: auto;">Apply to All</button>
    </div>
    
    <table class="channel-table">
        <thead>
            <tr>
                <th style="width: 40px;"><input type="checkbox" id="selectAllHeader" onchange="toggleSelectAll()"></th>
                <th style="width: 250px;">Telegram Group</th>
                <th>Configuration & Chat Workspace</th>
            </tr>
        </thead>
        <tbody id="channelTableBody">
            <!-- Rows generated by JS -->
        </tbody>
    </table>
    
    </div>
    
    <!-- Skill Overview Tab -->
    <div id="skills-tab" class="skill-overview">
        <h2 style="margin-bottom: 20px;">Available Skills</h2>
        <div id="skillList">
            <!-- Generated by JS -->
        </div>
    </div>
    
    <!-- Agents Tab -->
    <div id="agents-tab" class="skill-overview">
        <h2 style="margin-bottom: 20px;">Main Agents</h2>
        <div id="mainAgentsList">
            <!-- Generated by JS -->
        </div>
        <h2 style="margin: 30px 0 20px;">Sub-Agents</h2>
        <div id="subAgentsList">
            <!-- Generated by JS -->
        </div>
    </div>
    
    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <script>
        // Telegram Groups from Studio Framework
        const TELEGRAM_GROUPS = [

            { id: "-5272630186", name: "TG001_Idea_Capture", key: "idea-capture", status: "idle", currentTask: "Waiting for input" },

        // Agent Definitions with Default Skills
        const MAIN_AGENTS = [
            { 
                id: "tars", 
                name: "TARS", 
                role: "Planner", 
                description: "Constructive builder in artifact system", 
                color: "#50e3c2",
                defaultSkills: ["clawflow", "skill-creator", "clawhub"],

            },

            },
            {

                defaultSkills: ["web_search", "web_fetch"],
                soul: "Fast execution inside scope. Moves quick when plan is solid. Stops when reality diverges."
            }
        ];
        
        const SUB_AGENTS = [
            { id: "researcher", name: "Researcher", parent: "tars", description: "Web search and information gathering", additionalSkills: ["web_search", "web_fetch"] },
            { id: "coder", name: "Coder", parent: "sonic", description: "Code implementation and debugging", additionalSkills: ["omniverse-extension-development", "usd-development"] },
            { id: "reviewer", name: "Reviewer", parent: "marvin", description: "Code review and quality checks", additionalSkills: [] },
            { id: "documenter", name: "Documenter", parent: "tars", description: "Documentation and knowledge management", additionalSkills: ["notion"] },

        function applyBulkModel() {
            const modelId = document.getElementById('bulkModelSelect').value;
            if (!modelId) return;

            const selected = getSelectedChannels();
            if (selected.length === 0) {
                showToast('No channels selected');
                return;
            }

            selected.forEach(channelId => {
                const channel = config.channels.find(c => c.id === channelId);
                if (channel) channel.model = modelId;
            });

            renderTable();
            filterChannels();
            checkModified();
            showToast(`Applied model to ${selected.length} channels`);
        }

        function applyBulkSkill() {
            const skill = document.getElementById('bulkSkillSelect').value;
            if (!skill) return;

            const selected = getSelectedChannels();
            if (selected.length === 0) {
                showToast('No channels selected');
                return;
            }

            selected.forEach(channelId => {
                const channel = config.channels.find(c => c.id === channelId);
                if (channel) {
                    if (!channel.skills) channel.skills = [];
                    if (!channel.skills.includes(skill)) channel.skills.push(skill);
                }
            });

            renderTable();
            filterChannels();
            checkModified();
            showToast(`Added ${skill} to ${selected.length} channels`);
        }
        
        function populateFilterSkills() {
            const select = document.getElementById('filterSkill');

                option.textContent = skill;
                select.appendChild(option);
            });

        function filterChannels() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const modelFilter = document.getElementById('filterModel').value;
            const skillFilter = document.getElementById('filterSkill').value;
            
            const rows = document.querySelectorAll('#channelTableBody tr');
            let visibleCount = 0;
            
            rows.forEach(row => {
                const groupName = row.querySelector('.tg-name')?.textContent.toLowerCase() || '';
                const groupId = row.querySelector('.tg-id')?.textContent.toLowerCase() || '';
                const modelRadio = row.querySelector('input[type="radio"]:checked');
                const model = modelRadio?.value || '';
                const skills = Array.from(row.querySelectorAll('.skill-name')).map(s => s.textContent);
                
                const matchesSearch = !search || groupName.includes(search) || groupId.includes(search);
                const matchesModel = !modelFilter || model === modelFilter;
                const matchesSkill = !skillFilter || skills.includes(skillFilter);
                
                if (matchesSearch && matchesModel && matchesSkill) {
                    row.style.display = '';
                    visibleCount++;
                } else {
                    row.style.display = 'none';
                }
            });
            
            document.getElementById('filterCount').textContent = `${visibleCount} of ${rows.length} channels`;
        }
        
        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('filterModel').value = '';
            document.getElementById('filterSkill').value = '';
            filterChannels();

        async function loadConfig() {
            try {
                const response = await fetch('./channel_config.json');
                if (response.ok) {
                    const loaded = await response.json();
                    config = { channels: loaded.channels || [] };

                    // Load agents if saved
                    if (loaded.agents) {
                        loaded.agents.forEach((agent, idx) => {
                            if (MAIN_AGENTS[idx]) {
                                MAIN_AGENTS[idx].defaultSkills = agent.defaultSkills || MAIN_AGENTS[idx].defaultSkills;
                                if (agent.disabledSkills) MAIN_AGENTS[idx].disabledSkills = agent.disabledSkills;
                            }
                        });
                    }
                    if (loaded.subAgents) {
                        loaded.subAgents.forEach((sub, idx) => {
                            if (SUB_AGENTS[idx]) {
                                SUB_AGENTS[idx].additionalSkills = sub.additionalSkills || SUB_AGENTS[idx].additionalSkills;
                                if (sub.parent !== undefined) SUB_AGENTS[idx].parent = sub.parent;
                                if (sub.disabledSkills) SUB_AGENTS[idx].disabledSkills = sub.disabledSkills;
                            }
                        });
                    }
                }
            } catch (e) {
                // Use default empty config
                config = { channels: [] };
            }

            // Ensure all telegram groups exist in config
            TELEGRAM_GROUPS.forEach(group => {
                const existing = config.channels.find(c => c.id === group.id);
                if (!existing) {
                    config.channels.push({
                        id: group.id,
                        name: group.name,
                        model: "local-pc/google/gemma-4-26b-a4b",
                        skills: [],
                        require_mention: false
                    });
                }
            });
            
            renderTable();
        }

                                ${AVAILABLE_SKILLS.filter(s => !allSkills.includes(s)).map(s => 
                                    `<option value="${s}">${s} | ${SKILL_DESCRIPTIONS[s]}</option>`

                            <!-- Chat Tab -->
                            <div id="row-content-chat-${group.id}" class="chat-container" style="display: none; flex: 1; min-height: 250px;">
                                <div class="chat-messages" id="chat-messages-${group.id}">
                                    <div class="chat-message bot">
                                        <div class="chat-bubble">System: Channel initialized. Connected to OpenClaw gateway...</div>
                                        <div class="chat-meta"><span>${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span></div>
                                    </div>
                                </div>
                                <div style="display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border-color); background: var(--bg-surface);">

        function renderAllSkills(allSkills, defaultSkills, subAgentSkills, channelSkills, channelId) {
            return allSkills.map(skill => {
                let source = 'channel';
                if (defaultSkills.includes(skill)) source = 'default';
                else if (subAgentSkills.includes(skill)) source = 'subagent';
                
                const sourceBadge = {
                    'default': '<span style="font-size: 9px; color: #50e3c2; margin-left: 8px; text-transform: uppercase;">Inherited by Agent</span>',
                    'subagent': '<span style="font-size: 9px; color: #e3c450; margin-left: 8px; text-transform: uppercase;">Inherited by Sub-Agent</span>',
                    'channel': '<span style="font-size: 9px; color: #888; margin-left: 8px; text-transform: uppercase;">Channel Skill</span>'
                }[source];
                
                const canRemove = source === 'channel';
                
                return `
                    <div class="skill-item active" style="opacity: ${source === 'channel' ? 1 : 0.8};">
                        <input type="checkbox" checked onchange="toggleSkill('${channelId}', '${skill}', this.checked)">
                        <div class="skill-content">
                            <span class="skill-name">${skill}</span>
                            <span class="skill-separator">|</span>
                            <span class="skill-desc">${SKILL_DESCRIPTIONS[skill]}</span>
                            ${sourceBadge}
                        </div>
                        ${canRemove ? `<button class="remove" onclick="removeSkill('${channelId}', '${skill}')">×</button>` : '<span style="width: 20px;"></span>'}
                    </div>
                `;
            }).join('');
        }
        
        function renderSkills(skills, channelId) {
            return skills.map(skill => `
                <div class="skill-item active">
                    <input type="checkbox" checked onchange="toggleSkill('${channelId}', '${skill}', this.checked)">
                    <div class="skill-content">
                        <span class="skill-name">${skill}</span>
                        <span class="skill-separator">|</span>
                        <span class="skill-desc">${SKILL_DESCRIPTIONS[skill] || 'No description'}</span>
                    </div>
                    <button class="remove" onclick="removeSkill('${channelId}', '${skill}')">×</button>
                </div>
            `).join('');
        }
        
        function addSkill(channelId) {
            const select = document.getElementById(`skill-select-${channelId}`);
            const skill = select.value;
            if (!skill) return;

            const channel = config.channels.find(c => c.id === channelId);
            if (!channel.skills) channel.skills = [];

            if (!channel.skills.includes(skill)) {
                channel.skills.push(skill);
                renderTable();
                filterChannels();
                checkModified();
                showToast(`Added ${skill}`);
            }
        }

        function removeSkill(channelId, skill) {
            const channel = config.channels.find(c => c.id === channelId);
            if (channel && channel.skills) {
                channel.skills = channel.skills.filter(s => s !== skill);
                renderTable();
                filterChannels();
                checkModified();
                showToast(`Removed ${skill}`);
            }
        }
        
        function toggleSkill(channelId, skill, active) {
            // Skills are always in the list, checkbox just marks active state
            // For now, we just show/hide - could be extended to "enabled/disabled"
            showToast(`${skill} ${active ? 'enabled' : 'disabled'}`);
        }
        
        function assignAgent(channelId, agentId) {
            const channel = config.channels.find(c => c.id === channelId);
            if (channel) {
                channel.assignedAgent = agentId || null;
                channel.inactiveSubAgents = []; // Reset sub-agent selections
                renderTable();
                checkModified();
            }
        }

        function toggleChannelSubAgent(channelId, subAgentId, active) {
            const channel = config.channels.find(c => c.id === channelId);
            if (channel) {
                if (!channel.inactiveSubAgents) channel.inactiveSubAgents = [];
                if (active) {
                    channel.inactiveSubAgents = channel.inactiveSubAgents.filter(id => id !== subAgentId);
                } else {
                    if (!channel.inactiveSubAgents.includes(subAgentId)) channel.inactiveSubAgents.push(subAgentId);
                }
                renderTable();
                checkModified();
            }
        }
        
        function setModel(channelId, modelId) {
            const channel = config.channels.find(c => c.id === channelId);
            if (channel) {
                channel.model = modelId;
                renderTable();
                filterChannels();
                checkModified();
                showToast(`Model updated`);
            }
        }
        
        function applyGlobalModel() {
            const select = document.getElementById('bulkModelSelect');
            if (!select) return;
            const modelId = select.value;
            if (!modelId) return;
            
            config.channels.forEach(channel => {
                channel.model = modelId;
            });
            
            renderTable();
            filterChannels();
            showToast(`Applied ${AVAILABLE_MODELS.find(m => m.id === modelId)?.name || modelId} to all channels`);
        }
        
        function validateConfig() {
            const errors = [];
            const warnings = [];
            
            config.channels.forEach(channel => {
                // Check for missing model
                if (!channel.model) {
                    errors.push(`${channel.name}: No model selected`);
                }
                
                // Check for cloud model without skills (might be expensive)
                if (channel.model && !channel.model.includes('local') && (!channel.skills || channel.skills.length === 0)) {
                    warnings.push(`${channel.name}: Cloud model with no skills (may incur costs)`);
                }
                
                // Check for duplicate skills
                if (channel.skills) {
                    const unique = new Set(channel.skills);
                    if (unique.size !== channel.skills.length) {
                        errors.push(`${channel.name}: Duplicate skills detected`);
                    }
                }
            });
            
            return { errors, warnings };
        }
        
        function exportConfig() {
            const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `channel-config-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Config exported');
        }
        
        async function importConfig(input) {
            const file = input.files[0];
            if (!file) return;
            
            try {
                const text = await file.text();
                const imported = JSON.parse(text);
                
                if (!imported.channels || !Array.isArray(imported.channels)) {
                    throw new Error('Invalid config format');
                }
                
                // Validate imported channels
                imported.channels.forEach(ch => {
                    if (!ch.id || !ch.name) {
                        throw new Error('Channel missing required fields');
                    }
                });
                
                config = imported;
                renderTable();
                filterChannels();
                showToast(`Imported ${config.channels.length} channels`);
            } catch (e) {
                showToast(`Import failed: ${e.message}`);
            }
            
            input.value = '';
        }
        
        function updateSaveStatus(status, message, details = {}) {
            const statusEl = document.getElementById('saveStatus');
            const btn = document.getElementById('saveBtn');
            const time = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

            if (status === 'saving') {
                statusEl.innerHTML = '💾 <span style="color: var(--accent)">Saving ' + config.channels.length + ' channels...</span>';
                btn.disabled = true;
            } else if (status === 'saved') {
                const path = details.path ? details.path.split('/').pop() : 'config file';
                statusEl.innerHTML = '✅ <span style="color: #50e3c2">Saved ' + details.count + ' channels to ' + path + ' at ' + time + '</span>';
                btn.disabled = false;
                originalConfig = JSON.stringify(config);
                setTimeout(() => { statusEl.textContent = ''; }, 5000);
            } else if (status === 'error') {
                statusEl.innerHTML = '❌ <span style="color: #e35050">' + message + '</span>';
                btn.disabled = false;
            } else if (status === 'modified') {
                statusEl.innerHTML = '⚠️ <span style="color: #e3c450">Unsaved changes (' + config.channels.length + ' channels)</span>';
            }
        }
        
        async function saveConfig() {
            updateSaveStatus('saving');

            // Include agents in config
            const fullConfig = {
                ...config,
                agents: MAIN_AGENTS,
                subAgents: SUB_AGENTS
            };

            // Validate before saving
            const { errors, warnings } = validateConfig();
            
            if (errors.length > 0) {
                updateSaveStatus('error', errors.join(', '));
                return;
            }
            
            if (warnings.length > 0) {
                const proceed = confirm(`Warnings:\n${warnings.join('\n')}\n\nProceed with save?`);
                if (!proceed) {
                    updateSaveStatus('modified');
                    return;
                }
            }
            
            try {
                const response = await fetch('./api/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(fullConfig)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    updateSaveStatus('saved', '', { count: config.channels.length, path: data.path });
                    showToast(`✅ Saved ${config.channels.length} channels`);
                } else {
                    throw new Error(data.error || 'Failed to save');
                }
            } catch (e) {
                console.error('Save failed:', e);
                updateSaveStatus('error', 'Server save failed');
                
                // Fallback: download as file
                const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `channel-config-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('📥 Downloaded as file (server unavailable)');
            }
        }

                if (active) {

                if (active) {

        // --- Custom Full-Width Resizer Logic ---
        let isResizing = false;
        let currentResizeContainer = null;
        let startY = 0;
        let startHeight = 0;

        function initRowResize(e, channelId) {
            isResizing = true;
            currentResizeContainer = document.getElementById(`row-container-${channelId}`);
            startY = e.clientY;
            startHeight = currentResizeContainer.offsetHeight;
            
            document.body.style.cursor = 'ns-resize';
            
            // Add listeners to document so dragging works even if mouse leaves the handle
            document.addEventListener('mousemove', handleRowResize);
            document.addEventListener('mouseup', stopRowResize);
            e.preventDefault(); // Prevent text selection
        }

        function handleRowResize(e) {
            if (!isResizing || !currentResizeContainer) return;
            const deltaY = e.clientY - startY;
            const newHeight = Math.max(250, startHeight + deltaY); // enforce min-height
            currentResizeContainer.style.height = newHeight + 'px';
            currentResizeContainer.style.minHeight = newHeight + 'px'; // override CSS active tab defaults
        }

        function stopRowResize() {
            isResizing = false;
            currentResizeContainer = null;
            document.body.style.cursor = '';
            document.removeEventListener('mousemove', handleRowResize);
            document.removeEventListener('mouseup', stopRowResize);
        }

        function switchRowTab(channelId, tab) {
            document.getElementById(`tab-btn-config-${channelId}`).classList.toggle('active', tab === 'config');
            document.getElementById(`tab-btn-chat-${channelId}`).classList.toggle('active', tab === 'chat');
            
            document.getElementById(`row-content-config-${channelId}`).style.display = tab === 'config' ? 'flex' : 'none';
            document.getElementById(`row-content-chat-${channelId}`).style.display = tab === 'chat' ? 'flex' : 'none';
            
            // Auto expand row slightly when chat is opened
            const container = document.getElementById(`row-container-${channelId}`);
            if (tab === 'chat') {
                container.style.minHeight = '400px';
                // scroll to bottom of chat
                const messages = document.getElementById(`chat-messages-${channelId}`);
                messages.scrollTop = messages.scrollHeight;
            } else {
                container.style.minHeight = '250px';
                container.style.height = 'auto'; // allow shrinking if manually resized
            }
        }
        
        function handleChatKeypress(event, channelId) {
            if (event.key === 'Enter') {
                sendChatMessage(channelId);
            }
        }
        
        function sendChatMessage(channelId) {
            const input = document.getElementById(`chat-input-${channelId}`);
            const text = input.value.trim();
            if (!text) return;
            
            const messages = document.getElementById(`chat-messages-${channelId}`);
            
            // Add user message
            const userMsg = document.createElement('div');
            userMsg.className = 'chat-message user';
            userMsg.innerHTML = `
                <div class="chat-bubble">${text}</div>
                <div class="chat-meta"><span>${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span></div>
            `;
            messages.appendChild(userMsg);
            
            // Clear input
            input.value = '';
            messages.scrollTop = messages.scrollHeight;
            
            // Simulate bot response
            setTimeout(() => {
                const botMsg = document.createElement('div');
                botMsg.className = 'chat-message bot';
                
                // Add typing indicator first (optional) or just response
                const channel = config.channels.find(c => c.id === channelId);
                const agentId = TELEGRAM_GROUPS.find(g => g.id === channelId)?.assignedAgent || 'TARS';
                const agentName = MAIN_AGENTS.find(a => a.id === agentId)?.name || agentId;
                
                botMsg.innerHTML = `
                    <div style="font-size: 11px; margin-bottom: 4px; color: var(--accent);">${agentName}</div>
                    <div class="chat-bubble">Ich verarbeite "${text}" für Channel ${channelId}.</div>
                    <div class="chat-meta"><span>${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span></div>
                `;
                messages.appendChild(botMsg);
                messages.scrollTop = messages.scrollHeight;
            }, 1000);
        }

        // Initialize
        populateFilterSkills();
        populateBulkSkills();
        init();
        
        // Set initial config state for modification tracking
        setTimeout(() => { originalConfig = JSON.stringify(config); }, 100);
    </script>
</body>
</html>
