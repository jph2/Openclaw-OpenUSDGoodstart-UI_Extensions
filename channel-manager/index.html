<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Channel Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0a0a0a;
            --bg-surface: #111111;
            --bg-elevated: #1a1a1a;
            --border-color: #2a2a2a;
            --text-primary: #e0e0e0;
            --text-secondary: #888888;
            --accent: #50e3c2;
            --accent-hover: #3bc9a8;
            --danger: #e35050;
            --warning: #e3c450;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            z-index: 100;
            padding-top: 20px;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 600;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
        }
        
        button {
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        button:hover {
            background: var(--border-color);
            border-color: var(--accent);
        }
        
        button.primary {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: 500;
        }
        
        button.primary:hover {
            background: var(--accent-hover);
        }
        
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        select, input[type="text"] {
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            min-width: 200px;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        /* Table Styles */
        .channel-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-surface);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        
        .channel-table th {
            background: var(--bg-elevated);
            padding: 16px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
        }
        
        .channel-table td {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: top;
        }
        
        .channel-table tr:hover {
            background: rgba(80, 227, 194, 0.05);
        }
        
        .channel-table tr:last-child td {
            border-bottom: none;
        }
        
        /* Column 1: Telegram Group */
        .tg-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .tg-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .tg-id {
            font-size: 11px;
            color: var(--text-secondary);
            font-family: monospace;
        }
        
        /* Column 2: Skills - Vertical Layout */
        .skills-cell {
            min-width: 350px;
        }
        
        .skills-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .skill-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        
        .skill-item:hover {
            border-color: var(--accent);
        }
        
        .skill-item.active {
            border-color: var(--accent);
            background: rgba(80, 227, 194, 0.05);
        }
        
        .skill-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            margin-top: 2px;
            flex-shrink: 0;
        }
        
        .skill-content {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .skill-name {
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
        }
        
        .skill-separator {
            color: var(--text-secondary);
            font-weight: 300;
        }
        
        .skill-desc {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 400;
        }
        
        .skill-item button.remove {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 2px;
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .skill-item button.remove:hover {
            color: var(--danger);
        }
        
        .add-skill-row {
            display: flex;
            gap: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border-color);
        }
        
        .add-skill-row select {
            flex: 1;
            min-width: 150px;
        }
        
        /* Column 3: Model - Compact Layout */
        .model-cell {
            min-width: 200px;
        }
        
        .model-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .model-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        
        .model-item:hover {
            background: var(--bg-elevated);
        }
        
        .model-item.active {
            background: rgba(80, 227, 194, 0.1);
            border-color: var(--accent);
        }
        
        .model-item input[type="radio"] {
            width: 14px;
            height: 14px;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .model-content {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        
        .model-name {
            font-size: 13px;
            font-weight: 600;
        }
        
        .model-separator {
            color: var(--text-secondary);
            font-weight: 300;
        }
        
        .model-desc {
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            padding: 16px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 200;
        }
        
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        
        .toast.success {
            border-color: var(--accent);
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
        }
        
        .tab {
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .tab:hover {
            color: var(--text-primary);
        }
        
        .tab.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: 500;
        }
        
        /* Skill Overview */
        .skill-overview {
            display: none;
        }
        
        .skill-overview.active {
            display: block;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Status Indicators */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .status-badge.active {
            background: rgba(80, 227, 194, 0.15);
            color: var(--accent);
        }
        
        .status-badge.idle {
            background: rgba(136, 136, 136, 0.15);
            color: var(--text-secondary);
        }
        
        .status-badge.planning {
            background: rgba(227, 196, 80, 0.15);
            color: var(--warning);
        }
        
        .status-badge.research {
            background: rgba(80, 128, 227, 0.15);
            color: #5080e3;
        }
        
        .status-badge.standby {
            background: rgba(227, 80, 80, 0.15);
            color: var(--danger);
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }
        
        .current-task {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        .assigned-agent {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 6px;
        }
        
        /* Agent Cards */
        .agent-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }
        
        .agent-card.main {
            border-left: 4px solid;
        }
        
        .agent-card h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }
        
        .agent-role {
            font-size: 12px;
            color: var(--accent);
            margin-bottom: 8px;
        }
        
        .agent-desc {
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        .sub-agents {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }
        
        .sub-agent-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: var(--bg-elevated);
            border-radius: 4px;
            font-size: 11px;
            margin-right: 6px;
            margin-bottom: 6px;
        }
        
        .skill-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }
        
        .skill-card h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: var(--accent);
        }
        
        .skill-card p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; align-items: center; gap: 30px;">
            <h1>📺 Channel Manager</h1>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('channels')" id="tab-channels">Manage Channels</button>
                <button class="tab" onclick="switchTab('skills')" id="tab-skills">Skills</button>
                <button class="tab" onclick="switchTab('agents')" id="tab-agents">Agents</button>
            </div>
        </div>
        <div class="header-actions">
            <button onclick="exportConfig()">📥 Export</button>
            <label style="cursor: pointer;">
                <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importConfig(this)">
                <span style="background: var(--bg-elevated); border: 1px solid var(--border-color); color: var(--text-primary); padding: 8px 16px; border-radius: 6px; font-size: 14px;">📤 Import</span>
            </label>
            <button onclick="loadConfig()">🔄 Reload</button>
            <button class="primary" onclick="saveConfig()">💾 Save</button>
        </div>
    </header>
    
    <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search channels..." oninput="filterChannels()">
        <select id="filterModel" onchange="filterChannels()">
            <option value="">All models</option>
        </select>
        <select id="filterSkill" onchange="filterChannels()">
            <option value="">All skills</option>
        </select>
        <button onclick="resetFilters()">Reset</button>
        <span id="filterCount" style="margin-left: auto; color: var(--text-secondary);"></span>
    </div>
    <!-- Manage Channels Tab -->
    <div id="channels-tab" class="tab-content active">
    <div class="toolbar">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
            <span>Select All</span>
        </label>
        <select id="bulkModelSelect">
            <option value="">Set model for selected...</option>
        </select>
        <button onclick="applyBulkModel()">Apply</button>
        <select id="bulkSkillSelect">
            <option value="">Add skill to selected...</option>
        </select>
        <button onclick="applyBulkSkill()">Add</button>
        <button onclick="applyGlobalModel()" style="margin-left: auto;">Apply to All</button>
    </div>
    
    <table class="channel-table">
        <thead>
            <tr>
                <th style="width: 40px;"><input type="checkbox" id="selectAllHeader" onchange="toggleSelectAll()"></th>
                <th style="width: 200px;">Telegram Group</th>
                <th>Skills</th>
                <th style="width: 280px;">Model</th>
            </tr>
        </thead>
        <tbody id="channelTableBody">
            <!-- Rows generated by JS -->
        </tbody>
    </table>
    
    </div>
    
    <!-- Skill Overview Tab -->
    <div id="skills-tab" class="skill-overview">
        <h2 style="margin-bottom: 20px;">Available Skills</h2>
        <div id="skillList">
            <!-- Generated by JS -->
        </div>
    </div>
    
    <!-- Agents Tab -->
    <div id="agents-tab" class="skill-overview">
        <h2 style="margin-bottom: 20px;">Main Agents</h2>
        <div id="mainAgentsList">
            <!-- Generated by JS -->
        </div>
        <h2 style="margin: 30px 0 20px;">Sub-Agents</h2>
        <div id="subAgentsList">
            <!-- Generated by JS -->
        </div>
    </div>
    
    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <script>
        // Telegram Groups from Studio Framework
        const TELEGRAM_GROUPS = [
            { id: "-5207805052", name: "TG000_General_Chat", key: "general-chat", status: "active", currentTask: "General conversation", assignedAgent: null, subAgent: null },
            { id: "-5272630186", name: "TG001_Idea_Capture", key: "idea-capture", status: "idle", currentTask: "Waiting for input", assignedAgent: null, subAgent: null },
            { id: "-5272630187", name: "TG010_General_Discovery_Research", key: "discovery-research", status: "idle", currentTask: "Research standby", assignedAgent: "tars", subAgent: "researcher" },
            { id: "-3510007915", name: "TG020_omniUSD", key: "omniusd", status: "active", currentTask: "USD scene development", assignedAgent: "tars", subAgent: "coder" },
            { id: "-5272630188", name: "TG030_dcc_cad", key: "dcc-cad", status: "idle", currentTask: "DCC tools ready", assignedAgent: null, subAgent: null },
            { id: "-5272630189", name: "TG040_webdev_backend", key: "webdev-backend", status: "active", currentTask: "API development", assignedAgent: "sonic", subAgent: "coder" },
            { id: "-5272630190", name: "TG050_webdev_frontend", key: "webdev-frontend", status: "active", currentTask: "UI improvements", assignedAgent: "sonic", subAgent: "coder" },
            { id: "-5272630191", name: "TG060_social_media", key: "social-media", status: "idle", currentTask: "Monitoring mentions", assignedAgent: null, subAgent: null },
            { id: "-5272630192", name: "TG070_qa_security", key: "qa-security", status: "idle", currentTask: "Security checks", assignedAgent: "marvin", subAgent: "tester" },
            { id: "-5272630193", name: "TG500_openclaw_governance", key: "openclaw-governance", status: "active", currentTask: "System orchestration", assignedAgent: "tars", subAgent: null },
            { id: "-5272630194", name: "TG510_upcoming_skills", key: "upcoming-skills", status: "planning", currentTask: "Skill planning", assignedAgent: "tars", subAgent: null },
            { id: "-5272630195", name: "TG520_agentic_intelligence", key: "agentic-intelligence", status: "research", currentTask: "Agent architecture", assignedAgent: "tars", subAgent: "researcher" },
            { id: "-5272630196", name: "TG700_studio_framework", key: "studio-framework", status: "active", currentTask: "Framework development", assignedAgent: "sonic", subAgent: "documenter" },
            { id: "-5012559503", name: "TG800_experimental_box", key: "experimental-box", status: "active", currentTask: "Channel Manager UI", assignedAgent: "sonic", subAgent: "coder" },
            { id: "-5272630197", name: "TG900_troubleshooting", key: "troubleshooting", status: "standby", currentTask: "Debug ready", assignedAgent: "marvin", subAgent: "reviewer" }
        ];
        
        // Agent Definitions with Default Skills
        const MAIN_AGENTS = [
            { 
                id: "tars", 
                name: "TARS", 
                role: "Planner", 
                description: "Constructive builder in artifact system", 
                color: "#50e3c2",
                defaultSkills: ["clawflow", "skill-creator", "clawhub"],
                soul: "Direct, honest, useful. No fake certainty. Builds with architecture and rigor."
            },
            { 
                id: "marvin", 
                name: "MARVIN", 
                role: "Critic", 
                description: "Adversarial audit and QA", 
                color: "#e35050",
                defaultSkills: ["healthcheck", "node-connect"],
                soul: "Zero-trust reviewer. Assumes everything is broken. Finds failures before they find you."
            },
            { 
                id: "sonic", 
                name: "SONIC", 
                role: "Executor", 
                description: "Fast implementation mode", 
                color: "#e3c450",
                defaultSkills: ["web_search", "web_fetch"],
                soul: "Fast execution inside scope. Moves quick when plan is solid. Stops when reality diverges."
            }
        ];
        
        const SUB_AGENTS = [
            { id: "researcher", name: "Researcher", parent: "tars", description: "Web search and information gathering", additionalSkills: ["web_search", "web_fetch"] },
            { id: "coder", name: "Coder", parent: "sonic", description: "Code implementation and debugging", additionalSkills: ["omniverse-extension-development", "usd-development"] },
            { id: "reviewer", name: "Reviewer", parent: "marvin", description: "Code review and quality checks", additionalSkills: [] },
            { id: "documenter", name: "Documenter", parent: "tars", description: "Documentation and knowledge management", additionalSkills: ["notion"] },
            { id: "tester", name: "Tester", parent: "marvin", description: "Testing and validation", additionalSkills: ["healthcheck"] }
        ];
        
        const MODEL_DESCRIPTIONS = {
            "local-pc/google/gemma-4-26b-a4b": "Fast local inference, primary model",
            "moonshot/kimi-k2.5": "Strong reasoning, good for complex tasks",
            "kimi/kimi-code": "Optimized for coding tasks",
            "openai-codex/gpt-5.4": "Latest OpenAI model, high capability"
        };
        
        const AVAILABLE_MODELS = [
            { id: "local-pc/google/gemma-4-26b-a4b", name: "Gemma 4 26B", type: "local" },
            { id: "moonshot/kimi-k2.5", name: "Kimi K2.5", type: "cloud" },
            { id: "kimi/kimi-code", name: "Kimi Code", type: "cloud" },
            { id: "openai-codex/gpt-5.4", name: "Codex", type: "cloud" }
        ];
        
        const SKILL_DESCRIPTIONS = {
            "weather": "Get current weather and forecasts for any location",
            "web_search": "Search the web using Google Search grounding",
            "web_fetch": "Fetch and extract content from URLs",
            "healthcheck": "System security hardening and risk assessment",
            "node-connect": "Diagnose OpenClaw node connection failures",
            "notion": "Create and manage Notion pages and databases",
            "clawflow": "ClawFlow workflow orchestration and job management",
            "skill-creator": "Create, edit and audit AgentSkills",
            "omniverse-extension-development": "Develop Omniverse extensions and tools",
            "usd-development": "OpenUSD scene development and manipulation",
            "clawhub": "Search, install and publish agent skills",
            "mcporter": "Configure and call MCP servers and tools"
        };
        
        const AVAILABLE_SKILLS = Object.keys(SKILL_DESCRIPTIONS);
        
        let config = { channels: [] };
        
        function init() {
            populateGlobalModelSelect();
            loadConfig();
        }
        
        function populateGlobalModelSelect() {
            const filterSelect = document.getElementById('filterModel');
            const bulkSelect = document.getElementById('bulkModelSelect');
            AVAILABLE_MODELS.forEach(model => {
                if (filterSelect) {
                    const filterOption = document.createElement('option');
                    filterOption.value = model.id;
                    filterOption.textContent = model.name;
                    filterSelect.appendChild(filterOption);
                }
                
                if (bulkSelect) {
                    const bulkOption = document.createElement('option');
                    bulkOption.value = model.id;
                    bulkOption.textContent = model.name;
                    bulkSelect.appendChild(bulkOption);
                }
            });
        }
        
        function populateBulkSkills() {
            const select = document.getElementById('bulkSkillSelect');
            AVAILABLE_SKILLS.forEach(skill => {
                const option = document.createElement('option');
                option.value = skill;
                option.textContent = skill;
                select.appendChild(option);
            });
        }
        
        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll')?.checked || document.getElementById('selectAllHeader')?.checked;
            document.querySelectorAll('.channel-select').forEach(cb => {
                cb.checked = selectAll;
            });
        }
        
        function getSelectedChannels() {
            return Array.from(document.querySelectorAll('.channel-select:checked')).map(cb => cb.value);
        }
        
        function applyBulkModel() {
            const modelId = document.getElementById('bulkModelSelect').value;
            if (!modelId) return;
            
            const selected = getSelectedChannels();
            if (selected.length === 0) {
                showToast('No channels selected');
                return;
            }
            
            selected.forEach(channelId => {
                const channel = config.channels.find(c => c.id === channelId);
                if (channel) channel.model = modelId;
            });
            
            renderTable();
            filterChannels();
            showToast(`Applied model to ${selected.length} channels`);
        }
        
        function applyBulkSkill() {
            const skill = document.getElementById('bulkSkillSelect').value;
            if (!skill) return;
            
            const selected = getSelectedChannels();
            if (selected.length === 0) {
                showToast('No channels selected');
                return;
            }
            
            selected.forEach(channelId => {
                const channel = config.channels.find(c => c.id === channelId);
                if (channel) {
                    if (!channel.skills) channel.skills = [];
                    if (!channel.skills.includes(skill)) channel.skills.push(skill);
                }
            });
            
            renderTable();
            filterChannels();
            showToast(`Added ${skill} to ${selected.length} channels`);
        }
        
        function populateFilterSkills() {
            const select = document.getElementById('filterSkill');
            AVAILABLE_SKILLS.forEach(skill => {
                const option = document.createElement('option');
                option.value = skill;
                option.textContent = skill;
                select.appendChild(option);
            });
        }
        
        function filterChannels() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const modelFilter = document.getElementById('filterModel').value;
            const skillFilter = document.getElementById('filterSkill').value;
            
            const rows = document.querySelectorAll('#channelTableBody tr');
            let visibleCount = 0;
            
            rows.forEach(row => {
                const groupName = row.querySelector('.tg-name')?.textContent.toLowerCase() || '';
                const groupId = row.querySelector('.tg-id')?.textContent.toLowerCase() || '';
                const modelRadio = row.querySelector('input[type="radio"]:checked');
                const model = modelRadio?.value || '';
                const skills = Array.from(row.querySelectorAll('.skill-name')).map(s => s.textContent);
                
                const matchesSearch = !search || groupName.includes(search) || groupId.includes(search);
                const matchesModel = !modelFilter || model === modelFilter;
                const matchesSkill = !skillFilter || skills.includes(skillFilter);
                
                if (matchesSearch && matchesModel && matchesSkill) {
                    row.style.display = '';
                    visibleCount++;
                } else {
                    row.style.display = 'none';
                }
            });
            
            document.getElementById('filterCount').textContent = `${visibleCount} of ${rows.length} channels`;
        }
        
        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('filterModel').value = '';
            document.getElementById('filterSkill').value = '';
            filterChannels();
        }
        
        async function loadConfig() {
            try {
                const response = await fetch('./channel_config.json');
                if (response.ok) {
                    config = await response.json();
                }
            } catch (e) {
                // Use default empty config
                config = { channels: [] };
            }
            
            // Ensure all telegram groups exist in config
            TELEGRAM_GROUPS.forEach(group => {
                const existing = config.channels.find(c => c.id === group.id);
                if (!existing) {
                    config.channels.push({
                        id: group.id,
                        name: group.name,
                        model: "local-pc/google/gemma-4-26b-a4b",
                        skills: [],
                        require_mention: false
                    });
                }
            });
            
            renderTable();
        }
        
        function renderTable() {
            const tbody = document.getElementById('channelTableBody');
            tbody.innerHTML = '';
            
            TELEGRAM_GROUPS.forEach(group => {
                const channel = config.channels.find(c => c.id === group.id) || {
                    model: AVAILABLE_MODELS[0].id,
                    skills: []
                };
                
                const row = document.createElement('tr');
                row.dataset.channelId = group.id;
                const agent = MAIN_AGENTS.find(a => a.id === group.assignedAgent);
                const subAgent = SUB_AGENTS.find(s => s.id === group.subAgent);
                const agentColor = agent?.color || '#888';
                
                // Combine default skills + channel skills
                const defaultSkills = agent?.defaultSkills || [];
                const subAgentSkills = subAgent?.additionalSkills || [];
                const channelSkills = channel.skills || [];
                const allSkills = [...new Set([...defaultSkills, ...subAgentSkills, ...channelSkills])];
                
                row.innerHTML = `
                    <td>
                        <input type="checkbox" class="channel-select" value="${group.id}">
                    </td>
                    <td>
                        <div class="tg-group">
                            <div class="tg-name">${group.name}</div>
                            <div class="tg-id">${group.id}</div>
                            <span class="status-badge ${group.status}">
                                <span class="status-dot"></span>
                                ${group.status}
                            </span>
                            <div class="current-task">${group.currentTask}</div>
                            ${group.assignedAgent ? `
                                <span class="assigned-agent" style="background: ${agentColor}20; color: ${agentColor}; border: 1px solid ${agentColor}40;">
                                    ${agent?.name || group.assignedAgent}
                                    ${subAgent ? `→ ${subAgent.name}` : ''}
                                </span>
                            ` : ''}
                        </div>
                    </td>
                    <td class="skills-cell">
                        <div style="font-size: 10px; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">
                            ${allSkills.length} skills (Default: ${defaultSkills.length}, Sub: ${subAgentSkills.length}, Added: ${channelSkills.length})
                        </div>
                        <div class="skills-list" id="skills-${group.id}">
                            ${renderAllSkills(allSkills, defaultSkills, subAgentSkills, channelSkills, group.id)}
                        </div>
                        <div class="add-skill-row">
                            <select id="skill-select-${group.id}" onchange="addSkill('${group.id}')" class="skill-dropdown">
                                <option value="">Add channel skill...</option>
                                ${AVAILABLE_SKILLS.filter(s => !allSkills.includes(s)).map(s => 
                                    `<option value="${s}">${s} | ${SKILL_DESCRIPTIONS[s]}</option>`
                                ).join('')}
                            </select>
                        </div>
                    </td>
                    <td class="model-cell">
                        <div class="model-list">
                            ${AVAILABLE_MODELS.map(model => `
                                <label class="model-item ${channel.model === model.id ? 'active' : ''}">
                                    <input type="radio" name="model-${group.id}" 
                                           value="${model.id}" 
                                           ${channel.model === model.id ? 'checked' : ''}
                                           onchange="setModel('${group.id}', '${model.id}')">
                                    <div class="model-content">
                                        <span class="model-name">${model.name}</span>
                                        <span class="model-separator">|</span>
                                        <span class="model-desc">${MODEL_DESCRIPTIONS[model.id]}</span>
                                    </div>
                                </label>
                            `).join('')}
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }
        
        function renderAllSkills(allSkills, defaultSkills, subAgentSkills, channelSkills, channelId) {
            return allSkills.map(skill => {
                let source = 'channel';
                if (defaultSkills.includes(skill)) source = 'default';
                else if (subAgentSkills.includes(skill)) source = 'subagent';
                
                const sourceBadge = {
                    'default': '<span style="font-size: 9px; color: #50e3c2; margin-left: 8px;">[AGENT]</span>',
                    'subagent': '<span style="font-size: 9px; color: #e3c450; margin-left: 8px;">[SUB]</span>',
                    'channel': '<span style="font-size: 9px; color: #888; margin-left: 8px;">[CH]</span>'
                }[source];
                
                const canRemove = source === 'channel';
                
                return `
                    <div class="skill-item active" style="opacity: ${source === 'channel' ? 1 : 0.8};">
                        <input type="checkbox" checked onchange="toggleSkill('${channelId}', '${skill}', this.checked)">
                        <div class="skill-content">
                            <span class="skill-name">${skill}</span>
                            <span class="skill-separator">|</span>
                            <span class="skill-desc">${SKILL_DESCRIPTIONS[skill]}</span>
                            ${sourceBadge}
                        </div>
                        ${canRemove ? `<button class="remove" onclick="removeSkill('${channelId}', '${skill}')">×</button>` : '<span style="width: 20px;"></span>'}
                    </div>
                `;
            }).join('');
        }
        
        function renderSkills(skills, channelId) {
            return skills.map(skill => `
                <div class="skill-item active">
                    <input type="checkbox" checked onchange="toggleSkill('${channelId}', '${skill}', this.checked)">
                    <div class="skill-content">
                        <span class="skill-name">${skill}</span>
                        <span class="skill-separator">|</span>
                        <span class="skill-desc">${SKILL_DESCRIPTIONS[skill] || 'No description'}</span>
                    </div>
                    <button class="remove" onclick="removeSkill('${channelId}', '${skill}')">×</button>
                </div>
            `).join('');
        }
        
        function addSkill(channelId) {
            const select = document.getElementById(`skill-select-${channelId}`);
            const skill = select.value;
            if (!skill) return;
            
            const channel = config.channels.find(c => c.id === channelId);
            if (!channel.skills) channel.skills = [];
            
            if (!channel.skills.includes(skill)) {
                channel.skills.push(skill);
                renderTable();
                showToast(`Added ${skill}`);
            }
        }
        
        function removeSkill(channelId, skill) {
            const channel = config.channels.find(c => c.id === channelId);
            if (channel && channel.skills) {
                channel.skills = channel.skills.filter(s => s !== skill);
                renderTable();
                showToast(`Removed ${skill}`);
            }
        }
        
        function toggleSkill(channelId, skill, active) {
            // Skills are always in the list, checkbox just marks active state
            // For now, we just show/hide - could be extended to "enabled/disabled"
            showToast(`${skill} ${active ? 'enabled' : 'disabled'}`);
        }
        
        function setModel(channelId, modelId) {
            const channel = config.channels.find(c => c.id === channelId);
            if (channel) {
                channel.model = modelId;
                renderTable();
                showToast(`Model updated`);
            }
        }
        
        function applyGlobalModel() {
            const select = document.getElementById('bulkModelSelect');
            if (!select) return;
            const modelId = select.value;
            if (!modelId) return;
            
            config.channels.forEach(channel => {
                channel.model = modelId;
            });
            
            renderTable();
            filterChannels();
            showToast(`Applied ${AVAILABLE_MODELS.find(m => m.id === modelId)?.name || modelId} to all channels`);
        }
        
        function validateConfig() {
            const errors = [];
            const warnings = [];
            
            config.channels.forEach(channel => {
                // Check for missing model
                if (!channel.model) {
                    errors.push(`${channel.name}: No model selected`);
                }
                
                // Check for cloud model without skills (might be expensive)
                if (channel.model && !channel.model.includes('local') && (!channel.skills || channel.skills.length === 0)) {
                    warnings.push(`${channel.name}: Cloud model with no skills (may incur costs)`);
                }
                
                // Check for duplicate skills
                if (channel.skills) {
                    const unique = new Set(channel.skills);
                    if (unique.size !== channel.skills.length) {
                        errors.push(`${channel.name}: Duplicate skills detected`);
                    }
                }
            });
            
            return { errors, warnings };
        }
        
        function exportConfig() {
            const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `channel-config-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Config exported');
        }
        
        async function importConfig(input) {
            const file = input.files[0];
            if (!file) return;
            
            try {
                const text = await file.text();
                const imported = JSON.parse(text);
                
                if (!imported.channels || !Array.isArray(imported.channels)) {
                    throw new Error('Invalid config format');
                }
                
                // Validate imported channels
                imported.channels.forEach(ch => {
                    if (!ch.id || !ch.name) {
                        throw new Error('Channel missing required fields');
                    }
                });
                
                config = imported;
                renderTable();
                filterChannels();
                showToast(`Imported ${config.channels.length} channels`);
            } catch (e) {
                showToast(`Import failed: ${e.message}`);
            }
            
            input.value = '';
        }
        
        async function saveConfig() {
            // Validate before saving
            const { errors, warnings } = validateConfig();
            
            if (errors.length > 0) {
                showToast(`Errors: ${errors.join(', ')}`);
                return;
            }
            
            if (warnings.length > 0) {
                const proceed = confirm(`Warnings:\n${warnings.join('\n')}\n\nProceed with save?`);
                if (!proceed) return;
            }
            
            try {
                const response = await fetch('./api/save-config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showToast(`Saved to ${data.path}`);
                } else {
                    throw new Error(data.error || 'Failed to save');
                }
            } catch (e) {
                console.error('Save failed:', e);
                // Fallback: download as file
                const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'channel_config.json';
                a.click();
                URL.revokeObjectURL(url);
                showToast('Downloaded (server save failed)');
            }
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;
            toast.className = 'toast show success';
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            document.querySelectorAll('.tab-content, .skill-overview').forEach(el => {
                el.classList.remove('active');
            });
            
            if (tab === 'channels') {
                document.getElementById('channels-tab').classList.add('active');
            } else if (tab === 'skills') {
                document.getElementById('skills-tab').classList.add('active');
                renderSkillOverview();
            } else if (tab === 'agents') {
                document.getElementById('agents-tab').classList.add('active');
                renderAgentsOverview();
            }
        }
        
        function renderAgentsOverview() {
            // Main Agents
            const mainContainer = document.getElementById('mainAgentsList');
            mainContainer.innerHTML = MAIN_AGENTS.map(agent => {
                const subAgents = SUB_AGENTS.filter(sub => sub.parent === agent.id);
                return `
                    <div class="agent-card main" style="border-left-color: ${agent.color}">
                        <h3 style="color: ${agent.color}">${agent.name}</h3>
                        <div class="agent-role">${agent.role}</div>
                        <div class="agent-desc">${agent.description}</div>
                        <div style="margin-top: 12px; padding: 10px; background: var(--bg-elevated); border-radius: 6px; font-size: 12px; font-style: italic; color: var(--text-secondary); border-left: 2px solid ${agent.color};">
                            "${agent.soul}"
                        </div>
                        <div style="margin-top: 12px;">
                            <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 6px;">Default Skills:</div>
                            <div style="display: flex; flex-wrap: wrap; gap: 6px;">
                                ${agent.defaultSkills.map(skill => `
                                    <span class="sub-agent-tag">${skill}</span>
                                `).join('')}
                            </div>
                        </div>
                        ${subAgents.length > 0 ? `
                            <div class="sub-agents">
                                <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 8px;">Sub-Agents:</div>
                                ${subAgents.map(sub => `
                                    <span class="sub-agent-tag" title="${sub.description}">${sub.name}</span>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
            
            // Sub-Agents List
            const subContainer = document.getElementById('subAgentsList');
            subContainer.innerHTML = SUB_AGENTS.map(sub => {
                const parent = MAIN_AGENTS.find(a => a.id === sub.parent);
                return `
                    <div class="skill-card">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <h3>${sub.name}</h3>
                            <span style="font-size: 10px; color: ${parent?.color || '#888'}; padding: 2px 8px; background: ${parent?.color || '#888'}20; border-radius: 3px;">
                                ${parent?.name || sub.parent}
                            </span>
                        </div>
                        <p>${sub.description}</p>
                        ${sub.additionalSkills.length > 0 ? `
                            <div style="margin-top: 8px;">
                                <span style="font-size: 10px; color: var(--text-secondary);">Additional Skills:</span>
                                <div style="display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px;">
                                    ${sub.additionalSkills.map(skill => `
                                        <span style="font-size: 10px; padding: 2px 6px; background: var(--bg-elevated); border-radius: 3px;">${skill}</span>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }
        
        function renderSkillOverview() {
            const container = document.getElementById('skillList');
            container.innerHTML = AVAILABLE_SKILLS.map(skill => `
                <div class="skill-card">
                    <h3>${skill}</h3>
                    <p>${SKILL_DESCRIPTIONS[skill]}</p>
                </div>
            `).join('');
        }
        
        // Initialize
        populateFilterSkills();
        populateBulkSkills();
        init();
    </script>
</body>
</html>
