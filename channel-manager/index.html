<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Channel Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0a0a0a;
            --bg-surface: #111111;
            --bg-elevated: #1a1a1a;
            --border-color: #2a2a2a;
            --text-primary: #e0e0e0;
            --text-secondary: #888888;
            --accent: #50e3c2;
            --accent-hover: #3bc9a8;
            --danger: #e35050;
            --warning: #e3c450;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        h1 {
            font-size: 24px;
            font-weight: 600;
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
        }
        
        button {
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        button:hover {
            background: var(--border-color);
            border-color: var(--accent);
        }
        
        button.primary {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: 500;
        }
        
        button.primary:hover {
            background: var(--accent-hover);
        }
        
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        select, input[type="text"] {
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            min-width: 200px;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        /* Table Styles */
        .channel-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-surface);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        
        .channel-table th {
            background: var(--bg-elevated);
            padding: 16px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
        }
        
        .channel-table td {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: top;
        }
        
        .channel-table tr:hover {
            background: rgba(80, 227, 194, 0.05);
        }
        
        .channel-table tr:last-child td {
            border-bottom: none;
        }
        
        /* Column 1: Telegram Group */
        .tg-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .tg-name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .tg-id {
            font-size: 11px;
            color: var(--text-secondary);
            font-family: monospace;
        }
        
        /* Column 2: Skills */
        .skills-cell {
            min-width: 300px;
        }
        
        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }
        
        .skill-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .skill-item.active {
            border-color: var(--accent);
            background: rgba(80, 227, 194, 0.1);
        }
        
        .skill-item input[type="checkbox"] {
            width: 14px;
            height: 14px;
            cursor: pointer;
        }
        
        .skill-item button.remove {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 0;
            font-size: 14px;
            line-height: 1;
            cursor: pointer;
        }
        
        .skill-item button.remove:hover {
            color: var(--danger);
        }
        
        .add-skill-row {
            display: flex;
            gap: 8px;
        }
        
        .add-skill-row select {
            flex: 1;
            min-width: 150px;
        }
        
        /* Column 3: Model */
        .model-cell {
            min-width: 250px;
        }
        
        .model-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .model-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .model-item:hover {
            background: var(--bg-elevated);
        }
        
        .model-item.active {
            background: rgba(80, 227, 194, 0.1);
            border: 1px solid var(--accent);
        }
        
        .model-item input[type="radio"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        
        .model-name {
            font-size: 13px;
            flex: 1;
        }
        
        .model-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
            background: var(--bg-elevated);
            color: var(--text-secondary);
        }
        
        .model-badge.local {
            background: rgba(80, 227, 194, 0.2);
            color: var(--accent);
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            padding: 16px 20px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 200;
        }
        
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        
        .toast.success {
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <header>
        <h1>📺 Channel Manager</h1>
        <div class="header-actions">
            <button onclick="loadConfig()">🔄 Reload</button>
            <button class="primary" onclick="saveConfig()">💾 Save</button>
        </div>
    </header>
    
    <div class="toolbar">
        <select id="globalModelSelect">
            <option value="">Set model for all channels...</option>
        </select>
        <button onclick="applyGlobalModel()">Apply to All</button>
    </div>
    
    <table class="channel-table">
        <thead>
            <tr>
                <th style="width: 200px;">Telegram Group</th>
                <th>Skills</th>
                <th style="width: 280px;">Model</th>
            </tr>
        </thead>
        <tbody id="channelTableBody">
            <!-- Rows generated by JS -->
        </tbody>
    </table>
    
    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <script>
        // Telegram Groups from Studio Framework
        const TELEGRAM_GROUPS = [
            { id: "-5207805052", name: "TG00 — General Chat", key: "general-chat" },
            { id: "-5272630186", name: "TG01 — Idea Capture", key: "idea-capture" },
            { id: "-5272630187", name: "TG10 — Discovery & Research", key: "discovery-research" },
            { id: "-3510007915", name: "TG20 — omniUSD", key: "omniusd" },
            { id: "-5272630188", name: "TG30 — DCC/CAD", key: "dcc-cad" },
            { id: "-5272630189", name: "TG40 — WebDev Backend", key: "webdev-backend" },
            { id: "-5272630190", name: "TG50 — WebDev Frontend", key: "webdev-frontend" },
            { id: "-5272630191", name: "TG60 — Social Media", key: "social-media" },
            { id: "-5272630192", name: "TG70 — QA/Security", key: "qa-security" },
            { id: "-5272630193", name: "TG500 — OpenClaw Governance", key: "openclaw-governance" },
            { id: "-5272630194", name: "TG510 — Upcoming Skills", key: "upcoming-skills" },
            { id: "-5272630195", name: "TG520 — Agentic Intelligence", key: "agentic-intelligence" },
            { id: "-5272630196", name: "TG700 — Studio Framework", key: "studio-framework" },
            { id: "-5012559503", name: "TG800 — Experimental Box", key: "experimental-box" },
            { id: "-5272630197", name: "TG900 — Troubleshooting", key: "troubleshooting" }
        ];
        
        const AVAILABLE_MODELS = [
            { id: "local-pc/google/gemma-4-26b-a4b", name: "Gemma 4 26B", type: "local" },
            { id: "moonshot/kimi-k2.5", name: "Kimi K2.5", type: "cloud" },
            { id: "kimi/kimi-code", name: "Kimi Code", type: "cloud" },
            { id: "openai-codex/gpt-5.4", name: "Codex", type: "cloud" }
        ];
        
        const AVAILABLE_SKILLS = [
            "weather", "web_search", "web_fetch", "healthcheck", "node-connect",
            "notion", "clawflow", "skill-creator", "omniverse-extension-development",
            "usd-development", "clawhub", "mcporter"
        ];
        
        let config = { channels: [] };
        
        function init() {
            populateGlobalModelSelect();
            loadConfig();
        }
        
        function populateGlobalModelSelect() {
            const select = document.getElementById('globalModelSelect');
            AVAILABLE_MODELS.forEach(model => {
                const option = document.createElement('option');
                option.value = model.id;
                option.textContent = model.name;
                select.appendChild(option);
            });
        }
        
        async function loadConfig() {
            try {
                const response = await fetch('./channel_config.json');
                if (response.ok) {
                    config = await response.json();
                }
            } catch (e) {
                // Use default empty config
                config = { channels: [] };
            }
            
            // Ensure all telegram groups exist in config
            TELEGRAM_GROUPS.forEach(group => {
                const existing = config.channels.find(c => c.id === group.id);
                if (!existing) {
                    config.channels.push({
                        id: group.id,
                        name: group.name,
                        model: "local-pc/google/gemma-4-26b-a4b",
                        skills: [],
                        require_mention: false
                    });
                }
            });
            
            renderTable();
        }
        
        function renderTable() {
            const tbody = document.getElementById('channelTableBody');
            tbody.innerHTML = '';
            
            TELEGRAM_GROUPS.forEach(group => {
                const channel = config.channels.find(c => c.id === group.id) || {
                    model: AVAILABLE_MODELS[0].id,
                    skills: []
                };
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        <div class="tg-group">
                            <div class="tg-name">${group.name}</div>
                            <div class="tg-id">${group.id}</div>
                        </div>
                    </td>
                    <td class="skills-cell">
                        <div class="skills-list" id="skills-${group.id}">
                            ${renderSkills(channel.skills || [], group.id)}
                        </div>
                        <div class="add-skill-row">
                            <select id="skill-select-${group.id}" onchange="addSkill('${group.id}')">
                                <option value="">Add skill...</option>
                                ${AVAILABLE_SKILLS.filter(s => !(channel.skills || []).includes(s)).map(s => 
                                    `<option value="${s}">${s}</option>`
                                ).join('')}
                            </select>
                        </div>
                    </td>
                    <td class="model-cell">
                        <div class="model-list">
                            ${AVAILABLE_MODELS.map(model => `
                                <label class="model-item ${channel.model === model.id ? 'active' : ''}">
                                    <input type="radio" name="model-${group.id}" 
                                           value="${model.id}" 
                                           ${channel.model === model.id ? 'checked' : ''}
                                           onchange="setModel('${group.id}', '${model.id}')">
                                    <span class="model-name">${model.name}</span>
                                    <span class="model-badge ${model.type}">${model.type}</span>
                                </label>
                            `).join('')}
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }
        
        function renderSkills(skills, channelId) {
            return skills.map(skill => `
                <div class="skill-item active">
                    <input type="checkbox" checked onchange="toggleSkill('${channelId}', '${skill}', this.checked)">
                    <span>${skill}</span>
                    <button class="remove" onclick="removeSkill('${channelId}', '${skill}')">×</button>
                </div>
            `).join('');
        }
        
        function addSkill(channelId) {
            const select = document.getElementById(`skill-select-${channelId}`);
            const skill = select.value;
            if (!skill) return;
            
            const channel = config.channels.find(c => c.id === channelId);
            if (!channel.skills) channel.skills = [];
            
            if (!channel.skills.includes(skill)) {
                channel.skills.push(skill);
                renderTable();
                showToast(`Added ${skill}`);
            }
        }
        
        function removeSkill(channelId, skill) {
            const channel = config.channels.find(c => c.id === channelId);
            if (channel && channel.skills) {
                channel.skills = channel.skills.filter(s => s !== skill);
                renderTable();
                showToast(`Removed ${skill}`);
            }
        }
        
        function toggleSkill(channelId, skill, active) {
            // Skills are always in the list, checkbox just marks active state
            // For now, we just show/hide - could be extended to "enabled/disabled"
            showToast(`${skill} ${active ? 'enabled' : 'disabled'}`);
        }
        
        function setModel(channelId, modelId) {
            const channel = config.channels.find(c => c.id === channelId);
            if (channel) {
                channel.model = modelId;
                renderTable();
                showToast(`Model updated`);
            }
        }
        
        function applyGlobalModel() {
            const select = document.getElementById('globalModelSelect');
            const modelId = select.value;
            if (!modelId) return;
            
            config.channels.forEach(channel => {
                channel.model = modelId;
            });
            
            renderTable();
            showToast(`Applied ${AVAILABLE_MODELS.find(m => m.id === modelId)?.name || modelId} to all channels`);
        }
        
        async function saveConfig() {
            try {
                const response = await fetch('/api/save-config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                
                if (response.ok) {
                    showToast('Configuration saved', 'success');
                } else {
                    throw new Error('Failed to save');
                }
            } catch (e) {
                // Fallback: download as file
                const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'channel_config.json';
                a.click();
                URL.revokeObjectURL(url);
                showToast('Configuration downloaded');
            }
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;
            toast.className = 'toast show success';
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // Initialize
        init();
    </script>
</body>
</html>
